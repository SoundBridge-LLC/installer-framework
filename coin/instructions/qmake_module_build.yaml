type: Group
instructions:
  - type: MakeDirectory
    directory: ".git"

  - type: SetBuildDirectory
    directory: "{{.SourceDir}}"
    disable_if:
      condition: property
      property: features
      contains_value: OutOfSourceBuild
  - type: Group
    instructions:
      - type: SetBuildDirectory
        directory: "{{.AgentWorkingDir}}/build"
      - type: MakeDirectory
        directory: "{{.BuildDir}}"
    enable_if:
      condition: property
      property: features
      contains_value: OutOfSourceBuild
  - type: ChangeDirectory
    directory: "{{.BuildDir}}"

  - type: ExecuteCommand
    command: ["{{.InstallDir}}/bin/qmake", "INSTALL_PREFIX={{.InstallDir}}", "INCLUDEPATH+={{.Env.BZIP2_ARM}}", "INCLUDEPATH+={{.Env.XZ_ARM}}/src/liblzma/api", "INCLUDEPATH+={{.Env.ZLIB_ARM}}", "LIBS+=-L{{.Env.BZIP2_ARM}}", "LIBS+=-L{{.Env.XZ_ARM}}/Build/Release", "LIBS+=-L{{.Env.ZLIB_ARM}}", "{{.SourceDir}}"]
    maxTimeInSeconds: 1800
    maxTimeBetweenOutput: 600
    userMessageOnFailure: "Failed to run qmake, check logs."
    enable_if:
      condition: and
      conditions:
        - condition: property
          property: host.os
          equals_value: Windows
        - condition: property
          property: target.arch
          equals_value: AARCH64

  - type: ExecuteCommand
    command: ["{{.InstallDir}}/bin/qmake", "QTPLUGIN.platforms = qminimal qxcb", "INSTALL_PREFIX={{.InstallDir}}", "{{.SourceDir}}"]
    maxTimeInSeconds: 1800
    maxTimeBetweenOutput: 600
    userMessageOnFailure: "Failed to run qmake, check logs."
    enable_if:
      condition: property
      property: host.os
      equals_value: Linux

  - type: ExecuteCommand
    command: ["{{.InstallDir}}/bin/qmake", "INSTALL_PREFIX={{.InstallDir}}", "{{.SourceDir}}"]
    maxTimeInSeconds: 1800
    maxTimeBetweenOutput: 600
    userMessageOnFailure: "Failed to run qmake, check logs."
    disable_if:
      condition: or
      conditions:
        - condition: property
          property: host.os
          equals_value: Linux
        - condition: and
          conditions:
            - condition: property
              property: host.os
              equals_value: Windows
            - condition: property
              property: target.arch
              equals_value: AARCH64

  - !include "{{installer-framework/installer-framework}}/make_instructions.yaml"
  - !include "{{installer-framework/installer-framework}}/make_documentation.yaml"
